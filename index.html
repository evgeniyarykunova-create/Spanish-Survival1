<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡Vivir en España! - Pro Extension</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --spain-red: #aa151b; --spain-gold: #ffcc00; --success: #4caf50; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* ЭКРАН ПРИВЕТСТВИЯ */
        #welcome-screen {
            position: fixed; inset: 0; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
            url('https://images.unsplash.com/photo-1543783232-261f910d3938?q=80&w=1200') center/cover;
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        /* КАРТА */
        #map-screen {
            position: fixed; inset: 0; background-size: 100% 100%; display: none; z-index: 1000;
        }

        .map-pin {
            position: absolute; width: 60px; height: 60px; transform: translate(-50%, -50%);
            cursor: pointer; transition: 0.3s;
        }
        .map-pin img { width: 100%; height: 100%; object-fit: contain; }
        .map-pin:hover { transform: translate(-50%, -50%) scale(1.2); }
        .pin-label { 
            position: absolute; top: 110%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; white-space: nowrap;
        }

        /* ИГРОВОЙ ЭКРАН */
        #game-screen {
            width: 100%; height: 100vh; background-size: cover; background-position: center;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .quest-card {
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 25px;
            width: 85%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; position: relative;
        }

        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 12px; cursor: pointer; }
        .character-img { position: absolute; bottom: -40px; right: -50px; width: 120px; }
        
        #hud { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 30px; border-radius: 30px; z-index: 1500; display: none; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <h1>¡Bienvenidos a España!</h1>
    <p>Твое приключение начинается здесь.</p>
    <button class="btn" style="width: 200px; background: var(--spain-gold); font-weight: bold;" onclick="startGame()">EMPEZAR</button>
</div>

<div id="hud">Puntos: <span id="score">0</span> | Progreso: <span id="progress">0</span>%</div>

<div id="map-screen"></div>

<div id="game-screen">
    <div id="quest-container" class="quest-card">
        <button onclick="exitToMap()" style="position: absolute; left: 15px; top: 15px; border: none; background: none; cursor: pointer;">⬅</button>
        <h2 id="title"></h2>
        <div id="content"></div>
        <p id="feedback" style="font-weight: bold; min-height: 1.2em;"></p>
        <img id="char" class="character-img" src="" alt="Guide">
    </div>
</div>

<script>
// Эти данные будут генерироваться Редактором
const config = {
    welcome: { title: "¡Bienvenidos!", sub: "Приключение начинается", bg: "https://images.unsplash.com/photo-1543783232-261f910d3938?q=80&w=1200" },
    map: { bg: "https://images.unsplash.com/photo-1528659556537-8856064f777e?q=80&w=2000" },
    character: "https://cdn-icons-png.flaticon.com/512/1999/1999155.png",
    locations: [
        {
            name: "Supermercado", icon: "https://cdn-icons-png.flaticon.com/512/3081/3081840.png",
            x: 30, y: 50, bg: "https://images.unsplash.com/photo-1578916171728-46686eac8d58?q=80&w=1200",
            successMsg: "¡Increíble! Теперь ты мастер закупок.",
            tasks: [
                { title: "Fruta", q: "Найди огурец", type: "quiz", options: ["Pepino", "Manzana"], correct: 0, win: "¡Bien! Огурец найден." }
            ],
            done: false
        }
    ]
};

let score = 0;

function startGame() {
    document.getElementById('welcome-screen').style.display = 'none';
    document.getElementById('map-screen').style.display = 'block';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('map-screen').style.backgroundImage = `url(${config.map.bg})`;
    renderMap();
}

function renderMap() {
    const map = document.getElementById('map-screen');
    map.innerHTML = '';
    config.locations.forEach((loc, i) => {
        const pin = document.createElement('div');
        pin.className = 'map-pin';
        pin.style.left = loc.x + '%';
        pin.style.top = loc.y + '%';
        pin.innerHTML = `<img src="${loc.icon}"><div class="pin-label">${loc.name} ${loc.done ? '✅' : ''}</div>`;
        pin.onclick = () => openLocation(i);
        map.appendChild(pin);
    });
    updateProgress();
}

function openLocation(idx) {
    const loc = config.locations[idx];
    document.getElementById('map-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('game-screen').style.backgroundImage = `url(${loc.bg})`;
    document.getElementById('char').src = config.character;
    document.getElementById('title').innerText = loc.name;
    
    const container = document.getElementById('content');
    container.innerHTML = '';
    
    loc.tasks.forEach((t, ti) => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.innerText = t.title + (t.done ? ' ✅' : '');
        if(!t.done) b.onclick = () => startTask(idx, ti);
        container.appendChild(b);
    });
}

function startTask(li, ti) {
    const t = config.locations[li].tasks[ti];
    const container = document.getElementById('content');
    container.innerHTML = `<h3>${t.q}</h3>`;
    
    t.options.forEach((opt, oi) => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.innerText = opt;
        b.onclick = () => {
            if(oi === t.correct) {
                t.done = true;
                score += 10;
                document.getElementById('feedback').innerText = t.win;
                setTimeout(() => checkLoc(li), 1500);
            } else {
                document.getElementById('feedback').innerText = "¡Inténtalo de nuevo!";
            }
        };
        container.appendChild(b);
    });
}

function checkLoc(li) {
    const loc = config.locations[li];
    document.getElementById('feedback').innerText = '';
    if(loc.tasks.every(t => t.done)) {
        loc.done = true;
        confetti();
        alert(loc.successMsg);
        exitToMap();
    } else {
        openLocation(li);
    }
}

function exitToMap() {
    document.getElementById('game-screen').style.display = 'none';
    startGame();
}

function updateProgress() {
    const total = config.locations.length;
    const done = config.locations.filter(l => l.completed || l.done).length;
    document.getElementById('score').innerText = score;
    document.getElementById('progress').innerText = Math.round((done/total)*100);
}
</script>
</body>
</html>
