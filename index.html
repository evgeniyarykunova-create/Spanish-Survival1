<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Misión España: Pro Edition</title>
    <style>
        :root { --spain-red: #aa151b; --spain-gold: #ffcc00; --success: #4caf50; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* ЭКРАН КАРТЫ */
        #map-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c3e50 url('https://images.unsplash.com/photo-1528659556537-8856064f777e?q=80&w=2000') center/cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; color: white;
        }

        /* ЭКРАН ЛОКАЦИИ (Dashboard с подзаданиями) */
        #game-screen {
            width: 100%; height: 100vh;
            background-size: cover; background-position: center;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .quest-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px; border-radius: 20px; width: 85%; max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center;
            position: relative;
        }

        /* Стили для выбора подзаданий */
        .subtask-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .subtask-item {
            padding: 15px; border: 2px solid #eee; border-radius: 12px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            background: white; transition: 0.3s;
        }
        .subtask-item:hover { border-color: var(--spain-gold); background: #fffdf5; }
        .subtask-item.done { border-color: var(--success); background: #f0fff0; cursor: default; }

        /* Стили для кнопок и инпутов */
        .option-btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            border: 2px solid #ddd; border-radius: 10px; cursor: pointer;
        }
        .option-btn:hover { border-color: var(--spain-red); background: #fdfdfd; }
        
        .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .img-option { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 3px solid transparent; }
        .img-option:hover { border-color: var(--spain-gold); }

        .hidden { display: none !important; }
        #progress-bar { position: fixed; bottom: 0; left: 0; height: 8px; background: var(--spain-gold); width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

<div id="map-screen">
    <h1 style="text-shadow: 2px 2px 10px black;">📍 Tu Mapa de Misiones</h1>
    <div id="map-pins" style="display: flex; gap: 20px;"></div>
</div>

<div id="game-screen">
    <div id="location-hub" class="quest-card">
        <button onclick="renderMap()" style="position: absolute; left: 20px; top: 20px; border: none; background: none; cursor: pointer;">⬅ Карта</button>
        <h2 id="hub-title" style="color: var(--spain-red); margin-top: 30px;"></h2>
        <p>Completa todas las tareas para avanzar:</p>
        <div id="subtask-container" class="subtask-list"></div>
        <button id="finish-loc-btn" class="option-btn hidden" onclick="renderMap()" style="background: var(--success); color: white; font-weight: bold; margin-top: 20px;">✅ ¡MISIÓN COMPLETADA! VOLVER AL MAPA</button>
    </div>

    <div id="task-window" class="quest-card hidden">
        <h3 id="task-title"></h3>
        <p id="task-desc"></p>
        <div id="task-content"></div>
        <p id="task-feedback" style="font-weight: bold; margin-top: 15px;"></p>
    </div>

    <div id="progress-bar"></div>
</div>

<script>
const gameData = [
    {
        name: "Supermercado",
        background: "https://images.unsplash.com/photo-1578916171728-46686eac8d58?q=80&w=1200",
        icon: "🛒",
        completed: false,
        subtasks: [
            { id: 0, title: "La Fruta", desc: "Encuentra el pepino:", type: "image", 
              options: [
                  {img: "https://images.unsplash.com/photo-1449333254703-78717b744070?w=200", correct: true},
                  {img: "https://images.unsplash.com/photo-1596333522248-101637328df7?w=200", correct: false}
              ], done: false },
            { id: 1, title: "El Pago", desc: "¿Cómo pides la cuenta?", type: "quiz", 
              options: ["La cuenta, por favor", "Tengo un perro", "Adiós"], correct: 0, done: false },
            { id: 2, title: "Ayuda", desc: "Escribe 'Где молоко?' (¿Dónde está la leche?):", type: "input", 
              correct: "¿dónde está la leche?", done: false }
        ]
    },
    {
        name: "Farmacia",
        background: "https://images.unsplash.com/photo-1631549916768-4119b295f78b?q=80&w=1200",
        icon: "💊",
        completed: false,
        subtasks: [
            { id: 0, title: "Síntomas", desc: "Dile que te duele la cabeza:", type: "quiz", 
              options: ["Me duele la cabeza", "Me gusta el sol"], correct: 0, done: false }
        ]
    }
];

let currentLoc = null;
let currentSubtask = null;

function renderMap() {
    document.getElementById('map-screen').classList.remove('hidden');
    document.getElementById('game-screen').style.display = 'none';
    const container = document.getElementById('map-pins');
    container.innerHTML = '';

    gameData.forEach((loc, i) => {
        const isLocked = i > 0 && !gameData[i-1].completed;
        const div = document.createElement('div');
        div.style.cssText = `background:white; color:black; padding:20px; border-radius:15px; cursor:pointer; text-align:center; min-width:100px; border: 4px solid ${loc.completed ? 'var(--success)' : 'var(--spain-gold)'}; ${isLocked ? 'opacity:0.5; filter:grayscale(1); cursor:not-allowed;' : ''}`;
        div.innerHTML = `<span style="font-size:40px">${loc.icon}</span><br><b>${loc.name}</b>`;
        if(!isLocked) div.onclick = () => enterLocation(i);
        container.appendChild(div);
    });
}

function enterLocation(idx) {
    currentLoc = gameData[idx];
    document.getElementById('map-screen').classList.add('hidden');
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('game-screen').style.backgroundImage = `url(${currentLoc.background})`;
    renderHub();
}

function renderHub() {
    document.getElementById('location-hub').classList.remove('hidden');
    document.getElementById('task-window').classList.add('hidden');
    document.getElementById('hub-title').innerText = currentLoc.name;
    
    const container = document.getElementById('subtask-container');
    container.innerHTML = '';
    
    let allDone = true;
    currentLoc.subtasks.forEach(st => {
        const item = document.createElement('div');
        item.className = `subtask-item ${st.done ? 'done' : ''}`;
        item.innerHTML = `<span>${st.title}</span> <span>${st.done ? '✅' : '⏳'}</span>`;
        if(!st.done) {
            item.onclick = () => startSubtask(st);
            allDone = false;
        }
        container.appendChild(item);
    });

    if(allDone) {
        currentLoc.completed = true;
        document.getElementById('finish-loc-btn').classList.remove('hidden');
    } else {
        document.getElementById('finish-loc-btn').classList.add('hidden');
    }
}

function startSubtask(st) {
    currentSubtask = st;
    document.getElementById('location-hub').classList.add('hidden');
    document.getElementById('task-window').classList.remove('hidden');
    document.getElementById('task-title').innerText = st.title;
    document.getElementById('task-desc').innerText = st.desc;
    document.getElementById('task-feedback').innerText = '';
    
    const content = document.getElementById('task-content');
    content.innerHTML = '';

    if(st.type === 'quiz') {
        st.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkSub(i === st.correct);
            content.appendChild(btn);
        });
    } else if(st.type === 'image') {
        const grid = document.createElement('div');
        grid.className = 'img-grid';
        st.options.forEach(opt => {
            const img = document.createElement('img');
            img.src = opt.img;
            img.className = 'img-option';
            img.onclick = () => checkSub(opt.correct);
            grid.appendChild(img);
        });
        content.appendChild(grid);
    } else if(st.type === 'input') {
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.style.width = '80%';
        inp.style.padding = '10px';
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = 'Verificar';
        btn.onclick = () => checkSub(inp.value.toLowerCase().trim() === st.correct);
        content.appendChild(inp);
        content.appendChild(btn);
    }
}

function checkSub(isCorrect) {
    const fb = document.getElementById('task-feedback');
    if(isCorrect) {
        fb.innerText = "¡Muy bien! ✅"; fb.style.color = "green";
        currentSubtask.done = true;
        setTimeout(renderHub, 1200);
    } else {
        fb.innerText = "Sigue intentando... ❌"; fb.style.color = "red";
    }
}

renderMap();
</script>
</body>
</html>
