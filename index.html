<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quest España</title>
    <style>
        :root { --spain-red: #aa151b; --spain-gold: #ffcc00; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }

        /* Контейнер игры с фоном локации */
        #game-screen {
            width: 100%; height: 100vh;
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1s ease-in-out; /* Плавная смена фона */
        }

        /* Экран КАРТЫ (перекрывает всё) */
        #map-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c3e50 url('https://images.unsplash.com/photo-1528659556537-8856064f777e?q=80&w=2000') center/cover;
            display: none; /* По умолчанию скрыт */
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 999;
            color: white; text-align: center;
        }

        .quest-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px; border-radius: 20px; width: 80%; max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center;
        }

        .btn-next-mission {
            background: var(--spain-gold); color: black; padding: 20px 40px;
            font-size: 20px; font-weight: bold; border: 4px solid var(--spain-red);
            border-radius: 50px; cursor: pointer; animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        .option-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            border: 2px solid #ddd; border-radius: 10px; cursor: pointer; font-size: 16px;
        }
        .option-btn:hover { background: #f8f8f8; border-color: var(--spain-red); }
        
        #progress-bar { position: fixed; bottom: 0; left: 0; height: 10px; background: var(--spain-gold); width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

<div id="map-screen">
    <h1 style="text-shadow: 2px 2px 10px black;">¡Misión Completada!</h1>
    <p style="font-size: 1.2em; text-shadow: 2px 2px 5px black;">Te mueves por el mapa de España...</p>
    <div style="margin: 40px 0;">
        <span style="font-size: 80px;">📍</span>
    </div>
    <button class="btn-next-mission" onclick="startNextLocation()">IR A LA SIGUIENTE PARADA</button>
</div>

<div id="game-screen">
    <div class="quest-card">
        <h2 id="loc-title" style="color: var(--spain-red);"></h2>
        <p id="question-text" style="font-size: 18px;"></p>
        <div id="options-box"></div>
        <p id="feedback" style="margin-top: 20px; font-weight: bold;"></p>
    </div>
    <div id="progress-bar"></div>
</div>

<script>
const gameData = [
    {
        name: "Supermercado (Madrid)",
        background: "https://images.unsplash.com/photo-1578916171728-46686eac8d58?q=80&w=1200", // Фото полок магазина
        questions: [
            { q: "¿Cómo pides la cuenta?", options: ["La cuenta, por favor", "Hola, ¿qué tal?", "Soy un tomate"], correct: 0 }
        ]
    },
    {
        name: "Farmacia (Barcelona)",
        background: "https://images.unsplash.com/photo-1631549916768-4119b295f78b?q=80&w=1200", // Фото аптеки
        questions: [
            { q: "Tienes tos. ¿Qué pides?", options: ["Jarabe para la tos", "Un kilo de manzanas", "Una entrada de cine"], correct: 0 }
        ]
    },
    {
        name: "Ayuntamiento (Valencia)",
        background: "https://images.unsplash.com/photo-1512411925324-406b29d4990d?q=80&w=1200", // Фото мэрии/офиса
        questions: [
            { q: "¿Dónde está el padrón?", options: ["En la oficina", "En el parque", "En el café"], correct: 0 }
        ]
    }
];

let currentLocIdx = 0;

function loadLocation() {
    // Скрываем карту
    document.getElementById('map-screen').style.display = 'none';
    
    const loc = gameData[currentLocIdx];
    
    // 1. МЕНЯЕМ ФОН (Background-image)
    document.getElementById('game-screen').style.backgroundImage = `url('${loc.background}')`;
    
    // 2. ОБНОВЛЯЕМ ТЕКСТЫ
    document.getElementById('loc-title').innerText = loc.name;
    document.getElementById('question-text').innerText = loc.questions[0].q;
    
    // 3. ОБНОВЛЯЕМ КНОПКИ
    const box = document.getElementById('options-box');
    box.innerHTML = '';
    loc.questions[0].options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(i === loc.questions[0].correct);
        box.appendChild(btn);
    });

    document.getElementById('feedback').innerText = "";
    updateProgress();
}

function checkAnswer(isCorrect) {
    const fb = document.getElementById('feedback');
    if(isCorrect) {
        fb.innerHTML = "✅ ¡Excelente!<br>Te has ganado el respeto de los locales.";
        fb.style.color = "green";
        
        // Через 1.5 секунды "выбрасываем" на карту
        setTimeout(showMapTransition, 1500);
    } else {
        fb.innerText = "❌ Inténtalo de nuevo, ¡tú puedes!";
        fb.style.color = "red";
    }
}

function showMapTransition() {
    currentLocIdx++;
    if(currentLocIdx < gameData.length) {
        // ПОКАЗЫВАЕМ ЭКРАН КАРТЫ
        document.getElementById('map-screen').style.display = 'flex';
    } else {
        alert("🎉 ¡FELICIDADES! Tienes tu residencia en España.");
        currentLocIdx = 0; // Начать заново
        loadLocation();
    }
}

function startNextLocation() {
    loadLocation();
}

function updateProgress() {
    const percent = (currentLocIdx / gameData.length) * 100;
    document.getElementById('progress-bar').style.width = percent + '%';
}

// Запуск первой локации
loadLocation();
</script>
</body>
</html>
