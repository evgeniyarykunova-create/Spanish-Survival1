<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Vivir en España! - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --spain-red: #aa151b; 
            --spain-gold: #ffcc00; 
            --success: #2e7d32; 
            --success-bg: #eaffea;
            --error: #c62828;
            --error-bg: #ffebee;
            --dark: #2c3e50; 
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; }

        /* HUD: Очки и Прогресс-бар отдельно */
        #hud-container {
            position: fixed; top: 15px; left: 0; width: 100%; 
            display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 1500;
        }
        #score-box { background: white; padding: 5px 20px; border-radius: 20px; font-weight: bold; border: 2px solid var(--spain-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .progress-container { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; color: white; font-weight: bold; }
        .progress-bg { width: 150px; height: 12px; background: #444; border-radius: 10px; overflow: hidden; border: 1px solid #666; }
        #progress-fill { height: 100%; width: 0%; background: var(--spain-gold); transition: 0.5s; box-shadow: 0 0 10px var(--spain-gold); }

        #welcome-screen {
            position: absolute; inset: 0; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://files.catbox.moe/rseive.png') center/cover;
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center;
        }

        #map-screen { position: absolute; inset: 0; background-size: cover; background-position: center; display: none; z-index: 1000; }

        /* Анимация иконок на карте */
        .map-pin {
            position: absolute; width: 75px; height: 75px; transform: translate(-50%, -50%);
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .map-pin:hover { transform: translate(-50%, -50%) scale(1.3); filter: brightness(1.1); }
        .map-pin img { width: 100%; height: 100%; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.5)); }
        
        .pin-label { 
            position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 2px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; white-space: nowrap;
        }

        #game-screen { position: absolute; inset: 0; background-size: cover; background-position: center; display: none; align-items: center; justify-content: center; padding: 20px; }

        .quest-card {
            background: rgba(255, 255, 255, 0.98); padding: 35px; border-radius: 30px; width: 95%; max-width: 450px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; position: relative; z-index: 10;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .quest-card::-webkit-scrollbar { display: none; }

        .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #eee; border-radius: 15px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.2s; background: white; }
        .btn:hover:not(:disabled) { border-color: var(--spain-red); background: #f9f9f9; }
        
        #feedback { margin-top: 15px; padding: 12px; border-radius: 12px; font-weight: bold; display: none; }
        .feedback-correct { display: block !important; background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
        .feedback-wrong { display: block !important; background: var(--error-bg); color: var(--error); border: 1px solid var(--error); }

        .character-img { position: absolute; bottom: -50px; right: -60px; width: 150px; z-index: 5; pointer-events: none; }
        #back-btn { position: absolute; left: 15px; top: 15px; border: none; background: #eee; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <h1 style="font-size: 3em; margin: 0;">¡Vivir en España!</h1>
    <p style="margin-bottom: 30px;">Aprende español en situaciones reales</p>
    <button class="btn" style="width: 220px; background: var(--spain-gold); border: none;" onclick="startGame()">EMPEZAR AVENTURA</button>
</div>

<div id="hud-container" style="display:none;">
    <div id="score-box">Puntos: <span id="score">0</span> 🏆</div>
    <div class="progress-container">
        Progreso: 
        <div class="progress-bg"><div id="progress-fill"></div></div>
        <span id="progress-text">0</span>%
    </div>
</div>

<div id="map-screen"></div>

<div id="game-screen">
    <div id="quest-container" class="quest-card">
        <button id="back-btn" onclick="exitToMap()">←</button>
        <h2 id="title" style="color: var(--spain-red); margin-top: 10px;"></h2>
        <div id="content"></div>
        <div id="feedback"></div>
        <img id="char" class="character-img" src="" alt="Guide">
    </div>
</div>

<script>
const config = {
    map: { bg: "https://files.catbox.moe/yc67of.png" }, 
    character: "https://files.catbox.moe/cao772.png", 
    locations: [
        {
            name: "Supermercado", icon: "https://files.catbox.moe/xi6rhi.png",
            x: 25, y: 40, bg: "https://files.catbox.moe/mr4fjx.png",
            successMsg: "¡Excelente! Has comprado todo lo necesario.",
            tasks: [
                { title: "Sección de Fruta", q: "¿Cómo pides medio kilo de naranjas?", type: "quiz", options: ["Medio kilo, por favor", "Quiero un café", "Dos kilos de carne"], correct: 0, win: "¡Bien dicho! 🍊" },
                { title: "En la Caja", q: "¿Cómo preguntas por el precio?", type: "quiz", options: ["¿Cuánto cuesta?", "¿Dónde está el baño?", "Hola, adiós"], correct: 0, win: "¡Exacto! 💰" }
            ],
            done: false
        },
        {
            name: "Farmacia", icon: "https://files.catbox.moe/rfd6lh.png",
            x: 50, y: 70, bg: "https://files.catbox.moe/ei5qyi.png",
            successMsg: "¡Muy bien! Ahora tienes tu medicina.",
            tasks: [
                { title: "Síнтomas", q: "Tienes dolor de cabeza. ¿Qué dices?", type: "quiz", options: ["Tengo dolor de cabeza", "Tengo hambre", "Quiero un zapato"], correct: 0, win: "El farmacéutico te entiende. ✅" },
                { title: "Comprar", q: "Pide algo para la tos:", type: "quiz", options: ["Jarabe para la tos", "Un helado de fresa", "Una camiseta"], correct: 0, win: "¡Perfecto! 💊" }
            ],
            done: false
        },
        {
            name: "Tienda de Ropa", icon: "https://files.catbox.moe/18l090.png",
            x: 75, y: 35, bg: "https://files.catbox.moe/l7q1nj.png",
            successMsg: "¡Guau! Te queda muy bien esa ropa nueva.",
            tasks: [
                { title: "Probarse ropa", q: "¿Dónde te puedes probar la ropa?", type: "quiz", options: ["En el probador", "En la caja", "En la calle"], correct: 0, win: "¡Correcto! Vas al probador. 👗" },
                { title: "Talla", q: "¿Cómo pides una talla más pequeña?", type: "quiz", options: ["¿Tienen una talla más pequeña?", "¿Tienen pan?", "Es muy caro"], correct: 0, win: "¡Genial! La talla S te quedará bien. ✨" }
            ],
            done: false
        }
    ]
};

let score = 0;
let currentLocIdx = null;

function startGame() {
    document.getElementById('welcome-screen').style.display = 'none';
    document.getElementById('map-screen').style.display = 'block';
    document.getElementById('hud-container').style.display = 'flex';
    document.getElementById('map-screen').style.backgroundImage = `url(${config.map.bg})`;
    renderMap();
}

function renderMap() {
    const map = document.getElementById('map-screen');
    map.innerHTML = '';
    config.locations.forEach((loc, i) => {
        const pin = document.createElement('div');
        pin.className = 'map-pin';
        pin.style.left = loc.x + '%';
        pin.style.top = loc.y + '%';
        pin.innerHTML = `<img src="${loc.icon}"><div class="pin-label">${loc.name} ${loc.done ? '✅' : ''}</div>`;
        pin.onclick = () => openLocation(i);
        map.appendChild(pin);
    });
    updateProgress();
}

function openLocation(idx) {
    currentLocIdx = idx;
    const loc = config.locations[idx];
    document.getElementById('map-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('game-screen').style.backgroundImage = `url(${loc.bg})`;
    document.getElementById('char').src = config.character;
    document.getElementById('title').innerText = loc.name;
    renderHub();
}

function renderHub() {
    const loc = config.locations[currentLocIdx];
    const container = document.getElementById('content');
    const fb = document.getElementById('feedback');
    container.innerHTML = '';
    fb.style.display = 'none';
    
    loc.tasks.forEach((t, ti) => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.innerHTML = `<span>${t.title}</span> ${t.done ? '✅' : ''}`;
        if(!t.done) b.onclick = () => startTask(ti);
        else b.style.opacity = "0.7";
        container.appendChild(b);
    });
}

function startTask(ti) {
    const t = config.locations[currentLocIdx].tasks[ti];
    const container = document.getElementById('content');
    const fb = document.getElementById('feedback');
    container.innerHTML = `<h3 style="margin-bottom:20px;">${t.q}</h3>`;
    fb.style.display = 'none';
    
    t.options.forEach((opt, oi) => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.innerText = opt;
        b.onclick = () => {
            if(oi === t.correct) {
                t.done = true;
                score += 10;
                fb.innerText = t.win;
                fb.className = 'feedback-correct';
                container.querySelectorAll('.btn').forEach(btn => btn.disabled = true);
                setTimeout(checkLocFinished, 1500);
            } else {
                fb.innerText = "❌ Inténtalo de nuevo";
                fb.className = 'feedback-wrong';
            }
        };
        container.appendChild(b);
    });
}

function checkLocFinished() {
    const loc = config.locations[currentLocIdx];
    if(loc.tasks.every(t => t.done)) {
        loc.done = true;
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.getElementById('content').innerHTML = `<h2>🌟 ¡Misión Cumplida!</h2><p>${loc.successMsg}</p>`;
        document.getElementById('feedback').style.display = 'none';
        setTimeout(exitToMap, 2500);
    } else {
        renderHub();
    }
}

function exitToMap() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('map-screen').style.display = 'block';
    renderMap();
}

function updateProgress() {
    const total = config.locations.length;
    const done = config.locations.filter(l => l.done).length;
    const percent = Math.round((done/total)*100);
    document.getElementById('score').innerText = score;
    document.getElementById('progress-fill').style.width = percent + '%';
    document.getElementById('progress-text').innerText = percent;
}
</script>
</body>
</html>
