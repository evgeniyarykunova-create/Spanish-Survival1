<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡Vivir en España! - Curso Interactivo</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --spain-red: #aa151b; --spain-gold: #ffcc00; --success: #4caf50; --dark: #2c3e50; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }

        /* ЭКРАН ПРИВЕТСТВИЯ */
        #welcome-screen {
            position: fixed; inset: 0; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
            url('https://images.unsplash.com/photo-1503917988258-f19af5a9bb60?q=80&w=1400') center/cover;
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center;
        }

        /* КАРТА */
        #map-screen {
            position: fixed; inset: 0; 
            background-size: cover; background-position: center; 
            display: none; z-index: 1000;
        }

        .map-pin {
            position: absolute; width: 70px; height: 70px; transform: translate(-50%, -50%);
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .map-pin img { width: 100%; height: 100%; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        .map-pin:hover { transform: translate(-50%, -50%) scale(1.2); }
        .pin-label { 
            position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 4px 12px; border-radius: 20px; 
            font-size: 13px; font-weight: bold; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ИГРОВОЙ ЭКРАН */
        #game-screen {
            width: 100%; height: 100vh; background-size: cover; background-position: center;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .quest-card {
            background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 30px;
            width: 85%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; position: relative;
        }

        .btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            border: 2px solid #eee; border-radius: 15px; cursor: pointer; 
            font-size: 16px; font-weight: 500; transition: 0.3s; background: white;
        }
        .btn:hover { background: #f8f8f8; border-color: var(--spain-red); transform: translateY(-2px); }
        
        .character-img { position: absolute; bottom: -60px; right: -70px; width: 160px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); }
        
        #hud { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            background: white; color: var(--dark); padding: 10px 40px; 
            border-radius: 50px; z-index: 1500; display: none; font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); border: 2px solid var(--spain-gold);
        }
    </style>
</head>
<body>

<div id="welcome-screen">
    <h1 style="font-size: 3em; margin-bottom: 10px;">¡Vivir en España!</h1>
    <p style="font-size: 1.2em; margin-bottom: 30px;">Aprende español resolviendo situaciones reales.</p>
    <button class="btn" style="width: 250px; background: var(--spain-gold); font-weight: bold; border: none; height: 60px;" onclick="startGame()">EMPEZAR AVENTURA</button>
</div>

<div id="hud">Puntos: <span id="score">0</span> | Progreso: <span id="progress">0</span>%</div>

<div id="map-screen"></div>

<div id="game-screen">
    <div id="quest-container" class="quest-card">
        <button onclick="exitToMap()" style="position: absolute; left: 20px; top: 20px; border: none; background: none; cursor: pointer; font-size: 20px;">⬅</button>
        <h2 id="title" style="color: var(--spain-red); margin-top: 10px;"></h2>
        <div id="content"></div>
        <p id="feedback" style="font-weight: bold; min-height: 1.5em; margin-top: 20px;"></p>
        <img id="char" class="character-img" src="" alt="Guide">
    </div>
</div>

<script>
const config = {
    map: { bg: "https://images.unsplash.com/photo-1539037116277-4db20889f2d4?q=80&w=1400" }, // Вид на Мадрид
    character: "https://cdn-icons-png.flaticon.com/512/4140/4140047.png", // Персонаж (гид)
    locations: [
        {
            name: "Supermercado", icon: "https://cdn-icons-png.flaticon.com/512/3081/3081840.png",
            x: 25, y: 40, bg: "https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=1200",
            successMsg: "¡Excelente! Has comprado todo lo necesario.",
            tasks: [
                { title: "Sección de Fruta", q: "¿Cómo pides medio kilo de naranjas?", type: "quiz", options: ["Medio kilo, por favor", "Quiero un café", "Dos kilos de carne"], correct: 0, win: "¡Bien dicho! 🍊" },
                { title: "En la Caja", q: "¿Cómo preguntas por el precio?", type: "quiz", options: ["¿Cuánto cuesta?", "¿Dónde está el baño?", "Hola, adiós"], correct: 0, win: "¡Exacto! 💰" }
            ],
            done: false
        },
        {
            name: "Farmacia", icon: "https://cdn-icons-png.flaticon.com/512/4320/4320350.png",
            x: 50, y: 70, bg: "https://images.unsplash.com/photo-1587854692152-cbe660dbbb88?q=80&w=1200",
            successMsg: "¡Muy bien! Ahora tienes tu medicina.",
            tasks: [
                { title: "Síntomas", q: "Tienes dolor de cabeza. ¿Qué dices?", type: "quiz", options: ["Tengo dolor de cabeza", "Tengo hambre", "Quiero un zapato"], correct: 0, win: "El farmacéutico te entiende. ✅" },
                { title: "Comprar", q: "Pide algo para la tos:", type: "quiz", options: ["Jarabe para la tos", "Un helado de fresa", "Una camiseta"], correct: 0, win: "¡Perfecto! 💊" }
            ],
            done: false
        },
        {
            name: "Tienda de Ropa", icon: "https://cdn-icons-png.flaticon.com/512/3050/3050215.png",
            x: 75, y: 35, bg: "https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200",
            successMsg: "¡Guau! Te queda muy bien esa ropa nueva.",
            tasks: [
                { title: "Probarse ropa", q: "¿Dónde te puedes probar la ropa?", type: "quiz", options: ["En el probador", "En la caja", "En la calle"], correct: 0, win: "¡Correcto! Vas al probador. 👗" },
                { title: "Talla", q: "¿Cómo pides una talla más pequeña?", type: "quiz", options: ["¿Tienen una talla más pequeña?", "¿Tienen pan?", "Es muy caro"], correct: 0, win: "¡Genial! La talla S te quedará bien. ✨" }
            ],
            done: false
        }
    ]
};

let score = 0;
let currentLocIdx = null;

function startGame() {
    document.getElementById('welcome-screen').style.display = 'none';
    document.getElementById('map-screen').style.display = 'block';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('map-screen').style.backgroundImage = `url(${config.map.bg})`;
    renderMap();
}

function renderMap() {
    const map = document.getElementById('map-screen');
    map.innerHTML = '';
    config.locations.forEach((loc, i) => {
        const pin = document.createElement('div');
        pin.className = 'map-pin';
        pin.style.left = loc.x + '%';
        pin.style.top = loc.y + '%';
        pin.innerHTML = `<img src="${loc.icon}"><div class="pin-label">${loc.name} ${loc.done ? '✅' : ''}</div>`;
        pin.onclick = () => openLocation(i);
        map.appendChild(pin);
    });
    updateProgress();
}

function openLocation(idx) {
    currentLocIdx = idx;
    const loc = config.locations[idx];
    document.getElementById('map-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('game-screen').style.backgroundImage = `url(${loc.bg})`;
    document.getElementById('char').src = config.character;
    document.getElementById('title').innerText = loc.name;
    
    renderHub();
}

function renderHub() {
    const loc = config.locations[currentLocIdx];
    const container = document.getElementById('content');
    container.innerHTML = '';
    document.getElementById('feedback').innerText = '';
    
    loc.tasks.forEach((t, ti) => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.innerText = t.title + (t.done ? ' ✅' : '');
        if(!t.done) b.onclick = () => startTask(ti);
        else b.style.opacity = "0.7";
        container.appendChild(b);
    });
}

function startTask(ti) {
    const t = config.locations[currentLocIdx].tasks[ti];
    const container = document.getElementById('content');
    container.innerHTML = `<h3 style="margin-bottom:20px;">${t.q}</h3>`;
    
    t.options.forEach((opt, oi) => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.innerText = opt;
        b.onclick = () => {
            if(oi === t.correct) {
                t.done = true;
                score += 10;
                document.getElementById('feedback').innerText = t.win;
                document.getElementById('feedback').style.color = "var(--success)";
                setTimeout(() => {
                    checkLocFinished();
                }, 1500);
            } else {
                document.getElementById('feedback').innerText = "❌ Inténtalo de nuevo";
                document.getElementById('feedback').style.color = "var(--spain-red)";
            }
        };
        container.appendChild(b);
    });
}

function checkLocFinished() {
    const loc = config.locations[currentLocIdx];
    if(loc.tasks.every(t => t.done)) {
        loc.done = true;
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.getElementById('content').innerHTML = `<h2>🌟 ¡Misión Cumplida!</h2><p>${loc.successMsg}</p>`;
        setTimeout(exitToMap, 3000);
    } else {
        renderHub();
    }
}

function exitToMap() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('map-screen').style.display = 'block';
    renderMap();
}

function updateProgress() {
    const total = config.locations.length;
    const done = config.locations.filter(l => l.done).length;
    document.getElementById('score').innerText = score;
    document.getElementById('progress').innerText = Math.round((done/total)*100);
}

// Inicializar HUD al cargar si fuera necesario
</script>
</body>
</html>
