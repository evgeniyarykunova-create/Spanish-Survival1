<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Vivir en España! - Final Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --spain-red: #aa151b; 
            --spain-gold: #ffcc00; 
            --success: #2e7d32; 
            --success-bg: #eaffea;
            --error: #c62828;
            --error-bg: #ffebee;
            --dark: #2c3e50; 
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; }

        /* HUD В ОДНУ СТРОКУ */
        #hud-container {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 30px; z-index: 1500;
            background: rgba(255, 255, 255, 0.95); padding: 12px 40px; border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 2px solid var(--spain-gold);
            min-width: 450px; justify-content: center;
        }
        #score-box { font-size: 24px; font-weight: 800; color: var(--dark); }
        .progress-wrapper { display: flex; align-items: center; gap: 15px; font-weight: bold; color: var(--dark); font-size: 20px; }
        .progress-bg { width: 200px; height: 20px; background: #ddd; border-radius: 10px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--spain-gold), #fff176); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* ЭФФЕКТЫ ОТВЕТОВ */
        @keyframes bounce-check { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.4); filter: drop-shadow(0 0 15px #4caf50); } }
        @keyframes shake-x { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .anim-correct { animation: bounce-check 0.6s ease; display: inline-block; font-size: 1.5em; }
        .anim-wrong { animation: shake-x 0.4s ease; display: inline-block; font-size: 1.5em; }

        /* ОБЛАЧКО ТЕКСТА И ДЫХАНИЕ */
        @keyframes bubble-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .speech-bubble {
            background: white; border-radius: 20px; padding: 15px 25px;
            color: var(--dark); font-weight: bold; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); margin-bottom: 20px;
            animation: bubble-float 3s ease-in-out infinite; max-width: 250px;
        }
        .speech-bubble::after {
            content: ''; position: absolute; bottom: -10px; right: 50px;
            border-width: 15px 15px 0 0; border-style: solid; border-color: white transparent;
        }

        /* ЭКРАН ПРИВЕТСТВИЯ */
        #welcome-screen {
            position: absolute; inset: 0; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://files.catbox.moe/rseive.png') center/cover;
            z-index: 2000; display: flex; align-items: center; justify-content: center; color: white;
        }
        /* Исправленная верстка приветствия */
        .welcome-content { display: flex; flex-direction: row; align-items: center; justify-content: center; text-align: center; gap: 50px; width: 100%; max-width: 1000px; }
        .welcome-char-block { display: flex; flex-direction: column; align-items: center; }
        .welcome-text-block { display: flex; flex-direction: column; align-items: center; }

        /* КАРТА И ЛОКАЦИИ */
        #map-screen { position: absolute; inset: 0; background-size: cover; background-position: center; display: none; z-index: 1000; }
        .map-pin { position: absolute; width: 80px; height: 80px; transform: translate(-50%, -50%); cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1001; }
        .map-pin:hover { transform: translate(-50%, -50%) scale(1.3); }
        .map-pin img { width: 100%; height: 100%; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.5)); }
        .pin-label { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 2px 12px; border-radius: 15px; font-size: 13px; font-weight: bold; white-space: nowrap; }

        /* ИГРОВОЙ ЭКРАН */
        #game-screen { position: absolute; inset: 0; background-size: cover; background-position: center; display: none; align-items: center; justify-content: center; padding: 20px; }
        .quest-card { background: rgba(255, 255, 255, 0.98); padding: 35px; border-radius: 30px; width: 95%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; position: relative; z-index: 10; overflow: hidden; }

        /* ПЕРСОНАЖ ГЛОБАЛЬНО */
        .character-global { position: fixed; bottom: -10px; right: 20px; width: clamp(150px, 20vw, 220px); z-index: 2005; pointer-events: none; }
        #welcome-char { width: 300px; position: static; margin-bottom: -20px; }

        .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #eee; border-radius: 15px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.2s; background: white; }
        .btn:hover:not(:disabled) { border-color: var(--spain-red); background: #f9f9f9; }
        
        #feedback { margin-top: 15px; padding: 12px; border-radius: 12px; font-weight: bold; display: none; line-height: 1.4; }
        .feedback-correct { display: block !important; background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
        .feedback-wrong { display: block !important; background: var(--error-bg); color: var(--error); border: 1px solid var(--error); }

        #back-btn { position: absolute; left: 15px; top: 15px; border: none; background: #eee; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 18px; z-index: 20; }

        #final-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .final-card { background: white; padding: 50px; border-radius: 40px; text-align: center; max-width: 550px; width: 90%; border: 5px solid var(--spain-gold); animation: finalShow 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

<img id="main-character" class="character-global" style="display:none;" src="https://files.catbox.moe/cao772.png">

<div id="welcome-screen">
    <div class="welcome-content">
        <div class="welcome-char-block">
            <div class="speech-bubble">Hola. Es mi primer mes en España. Ayúdame a resolver todos mis problemas.</div>
            <img id="welcome-char" src="https://files.catbox.moe/cao772.png">
        </div>
        <div class="welcome-text-block">
            <h1 style="font-size: 3em; margin: 10px 0;">¡Vivir en España!</h1>
            <button class="btn" style="width: 250px; background: var(--spain-gold); border: none; height: 60px; font-size: 1.2em;" onclick="startGame()">EMPEZAR</button>
        </div>
    </div>
</div>

<div id="hud-container" style="display:none;">
    <div id="score-box"><span id="score">0</span> 🏆</div>
    <div class="progress-wrapper">
        <div class="progress-bg"><div id="progress-fill"></div></div>
        <span id="progress-text">0</span>%
    </div>
</div>

<div id="map-screen"></div>

<div id="game-screen">
    <div id="quest-container" class="quest-card">
        <button id="back-btn" onclick="exitToMap()">←</button>
        <h2 id="title" style="color: var(--spain-red); margin: 10px 0;"></h2>
        <div id="content"></div>
        <div id="feedback"></div>
    </div>
</div>

<div id="final-overlay">
    <div class="final-card">
        <h2>¡ENHORABUENA! 🥳</h2>
        <p id="final-text">Has completado todas las misiones. ¡Ahora estás listo para la vida en España!</p>
        <button class="btn" style="background: var(--spain-gold); border: none; height: 50px;" onclick="location.reload()">JUGAR ОTRA VEZ</button>
    </div>
</div>

<script>
const config = {
    map: { bg: "https://files.catbox.moe/yc67of.png" }, 
    locations: [
        {
            name: "Supermercado", icon: "https://files.catbox.moe/xi6rhi.png",
            x: 25, y: 40, bg: "https://files.catbox.moe/mr4fjx.png",
            successMsg: "¡Excelente! Has comprado todo lo necesario.",
            tasks: [
                { title: "Sección de Fruta", q: "¿Cómo pides medio kilo de naranjas?", type: "quiz", options: ["Medio kilo, por favor", "Quiero un café", "Dos kilos de carne"], correct: 0, win: "¡Bien dicho! 🍊" },
                { title: "En la Caja", q: "¿Cómo preguntas por el precio?", type: "quiz", options: ["¿Cuánto cuesta?", "¿Dónde está el baño?", "Hola, adiós"], correct: 0, win: "¡Exacto! 💰" }
            ],
            done: false
        },
        {
            name: "Farmacia", icon: "https://files.catbox.moe/rfd6lh.png",
            x: 50, y: 70, bg: "https://files.catbox.moe/ei5qyi.png",
            successMsg: "¡Muy bien! Ahora tienes tu medicina.",
            tasks: [
                { title: "Síntomas", q: "Tienes dolor de cabeza. ¿Qué dices?", type: "quiz", options: ["Tengo dolor de cabeza", "Tengo hambre", "Quiero un zapato"], correct: 0, win: "El farmacéutico te entiende. ✅" },
                { title: "Comprar", q: "Pide algo para la tos:", type: "quiz", options: ["Jarabe para la tos", "Un helado de fresa", "Una camiseta"], correct: 0, win: "¡Perfecto! 💊" }
            ],
            done: false
        },
        {
            name: "Tienda de Ropa", icon: "https://files.catbox.moe/18l090.png",
            x: 75, y: 35, bg: "https://files.catbox.moe/l7q1nj.png",
            successMsg: "¡Guau! Те queda muy bien esa ropa nueva.",
            tasks: [
                { title: "Probarse ropa", q: "¿Dónde te puedes probar la ropa?", type: "quiz", options: ["En el probador", "En la caja", "En la calle"], correct: 0, win: "¡Correcto! Vas al probador. 👗" },
                { title: "Talla", q: "¿Как попросить размер поменьше?", type: "quiz", options: ["¿Tienen una talla más pequeña?", "¿Tienen pan?", "Es muy caro"], correct: 0, win: "¡Genial! S тебе подойдет. ✨" }
            ],
            done: false
        }
    ]
};

let score = 0;
let currentLocIdx = null;

function startGame() {
    document.getElementById('welcome-screen').style.display = 'none';
    document.getElementById('map-screen').style.display = 'block';
    document.getElementById('hud-container').style.display = 'flex';
    document.getElementById('main-character').style.display = 'block'; // Показываем персонажа везде
    document.getElementById('map-screen').style.backgroundImage = `url(${config.map.bg})`;
    renderMap();
}

function renderMap() {
    const map = document.getElementById('map-screen');
    map.innerHTML = '';
    config.locations.forEach((loc, i) => {
        const pin = document.createElement('div');
        pin.className = 'map-pin';
        pin.style.left = loc.x + '%';
        pin.style.top = loc.y + '%';
        pin.innerHTML = `<img src="${loc.icon}"><div class="pin-label">${loc.name} ${loc.done ? '✅' : ''}</div>`;
        pin.onclick = () => openLocation(i);
        map.appendChild(pin);
    });
    updateProgress();
    checkGameFinish();
}

function openLocation(idx) {
    currentLocIdx = idx;
    const loc = config.locations[idx];
    document.getElementById('map-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('game-screen').style.backgroundImage = `url(${loc.bg})`;
    document.getElementById('title').innerText = loc.name;
    renderHub();
}

function renderHub() {
    const loc = config.locations[currentLocIdx];
    const container = document.getElementById('content');
    const fb = document.getElementById('feedback');
    fb.style.display = 'none';
    fb.innerHTML = '';
    fb.className = '';
    
    const doneTasks = loc.tasks.filter(t => t.done).length;
    container.innerHTML = `<p style="font-weight:bold; color:#666; margin-bottom:15px;">Progreso: ${doneTasks}/${loc.tasks.length}</p>`;
    
    loc.tasks.forEach((t, ti) => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.innerHTML = `<span>${t.title}</span> ${t.done ? '✅' : ''}`;
        if(!t.done) b.onclick = () => startTask(ti);
        else b.style.opacity = "0.7";
        container.appendChild(b);
    });
}

function startTask(ti) {
    const t = config.locations[currentLocIdx].tasks[ti];
    const container = document.getElementById('content');
    const fb = document.getElementById('feedback');
    fb.style.display = 'none';
    fb.innerHTML = '';
    fb.className = '';
    
    container.innerHTML = `<h3 style="margin-bottom:20px;">${t.q}</h3>`;
    
    t.options.forEach((opt, oi) => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.innerText = opt;
        b.onclick = () => {
            if(oi === t.correct) {
                t.done = true;
                score += 10;
                fb.innerHTML = `<span class="anim-correct">⭐ ✅ ⭐</span><br>${t.win}`;
                fb.className = 'feedback-correct';
                container.querySelectorAll('.btn').forEach(btn => btn.disabled = true);
                setTimeout(checkLocFinished, 1500);
            } else {
                fb.innerHTML = `<span class="anim-wrong">❌ X ❌</span><br>Inténtalo de nuevo`;
                fb.className = 'feedback-wrong';
            }
        };
        container.appendChild(b);
    });
}

function checkLocFinished() {
    const loc = config.locations[currentLocIdx];
    if(loc.tasks.every(t => t.done)) {
        loc.done = true;
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.getElementById('content').innerHTML = `<h2 style="color:var(--success)">🌟 ¡Misión Cumplida!</h2><p>${loc.successMsg}</p>`;
        document.getElementById('feedback').style.display = 'none';
        setTimeout(exitToMap, 2500);
    } else {
        renderHub();
    }
}

function checkGameFinish() {
    if(config.locations.every(l => l.done)) {
        setTimeout(() => {
            const duration = 6 * 1000;
            const animationEnd = Date.now() + duration;
            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                confetti({ startVelocity: 30, spread: 360, ticks: 60, zIndex: 6000, origin: { x: Math.random(), y: Math.random() - 0.2 } });
            }, 250);
            document.getElementById('final-overlay').style.display = 'flex';
        }, 1200);
    }
}

function exitToMap() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('map-screen').style.display = 'block';
    renderMap();
}

function updateProgress() {
    const total = config.locations.length;
    const done = config.locations.filter(l => l.done).length;
    const percent = Math.round((done/total)*100);
    document.getElementById('score').innerText = score;
    document.getElementById('progress-fill').style.width = percent + '%';
    document.getElementById('progress-text').innerText = percent;
}
</script>
</body>
</html>
